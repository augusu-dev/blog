<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>アウグス</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <a class="avatar" href="./" aria-label="ホームに戻る">
          <img src="./assets/icon.jpg" alt="アウグス">
        </a>
        <small>
          AIと共に成長し、希少価値を生み出せるクリエイターを目指す<br />
          ふと思ったこと、考えを自分の言葉で表します
        </small>
      </div>

      <div class="sns">
        <a href="https://bsky.app/profile/augusu.bsky.social" target="_blank" rel="noopener">Bluesky</a>
      </div>

      <nav class="nav">
        <a href="./about.html">About Me</a>
        <a href="./search.html">Search</a>
        <a href="./archives.html">Archives</a>
        <a href="./other.html">その他</a>
      </nav>
    </aside>

    <main class="main">
      <div class="article">
        <h1 style="margin:0 0 10px;">Search</h1>

        <input id="q" type="search" placeholder="タイトルで検索"
               style="width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:12px;">

        <div style="margin-top:12px; color:var(--muted); font-size:13px;">
          検索結果
        </div>

        <ul class="post-list" id="results" style="margin-top:8px;"></ul>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div>© 2026 Augusuのホームページ</div>
  </footer>

  <script type="module">
    import { loadIndex, renderPostList, setActiveNav } from './assets/app.js';

    setActiveNav('./search.html');

    const posts = await loadIndex();
    const q = document.getElementById('q');
    const results = document.getElementById('results');

    function run(){
      const term = q.value.trim().toLowerCase();
      const filtered = term
        ? posts.filter(p => (p.title || '').toLowerCase().includes(term) || (p.excerpt || '').toLowerCase().includes(term))
        : posts;

      renderPostList(results, filtered);
    }

    q.addEventListener('input', run);
    run();
  </script>
</body>
</html>
