<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>アウグス</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <a class="avatar" href="./" aria-label="ホームに戻る">
          <img src="./assets/icon.jpg" alt="アウグス">
        </a>
        <small>
          AIと共に成長し、希少価値を生み出せるクリエイターを目指す<br />
          ふと思ったこと、考えを自分の言葉で表します
        </small>
      </div>

      <div class="sns">
        <a href="https://bsky.app/profile/augusu.bsky.social" target="_blank" rel="noopener">Bluesky</a>
      </div>

      <nav class="nav">
        <a href="./about.html">About Me</a>
        <a href="./search.html">Search</a>
        <a href="./archives.html">Archives</a>
        <a href="./other.html">その他</a>
      </nav>
    </aside>

    <main class="main">
      <div class="article">
        <h1 style="margin:0 0 10px;">Archives</h1>
        <div id="archive"></div>
      </div>
    </main>
  </div>

  <footer class="footer">
    <div>© 2026 Augusuのホームページ</div>
  </footer>

  <script type="module">
    import { loadIndex, setActiveNav } from './assets/app.js';

    setActiveNav('./archives.html');

    const posts = await loadIndex();

    // 年ごとにまとめる
    const byYear = new Map();
    for(const p of posts){
      const y = (p.date || '').slice(0,4) || '----';
      if(!byYear.has(y)) byYear.set(y, []);
      byYear.get(y).push(p);
    }

    // 年を降順、記事も日付降順
    const years = [...byYear.keys()].sort((a,b)=> b.localeCompare(a));
    for(const y of years){
      byYear.get(y).sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    }

    const root = document.getElementById('archive');
    root.innerHTML = years.map(y => {
      const items = byYear.get(y).map(p => `
        <li>
          <div class="post-title">
            <a href="./post.html?slug=${encodeURIComponent(p.slug)}">${escapeHtml(p.title)}</a>
            <span class="post-date">${escapeHtml(p.date)}</span>
          </div>
        </li>
      `).join('');

      return `
        <div style="margin:14px 0 6px; font-weight:700;">${escapeHtml(y)}</div>
        <ul class="post-list">${items}</ul>
      `;
    }).join('');

    function escapeHtml(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }
  </script>
</body>
</html>
