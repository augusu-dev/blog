<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voxel Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="hud">
    <div id="info-panel">
      <div><b>PC:</b> クリック開始 / WASD移動 / Space:ジャンプ / 左:破壊 / 右:設置 / 1-6:選択</div>
      <div><b>Mobile:</b> 左スティック / 右ドラッグ / TAP / MODE / JUMP</div>
      <div class="small">
        Seed: <span id="seedDisplay">-</span> | Size: <span id="sizeDisplay">-</span> | Mode: <span id="modeDisplay">BREAK</span>
        <button id="resetBtn">RESET</button>
      </div>
      <div id="errorBox" style="color:#f66;margin-top:5px;"></div>
    </div>
    <div id="crosshair"></div>
    <div id="lockOverlay">
      <button id="startBtn">クリックして開始</button>
      <p style="color:#aaa;margin-top:10px;">モバイルはそのまま操作可</p>
    </div>
    <div id="hotbar"></div>
    <div id="mobileControls">
      <div id="joystickArea"><div id="joystickBase"><div id="joystickStick"></div></div></div>
      <div id="mobileButtons">
        <button id="modeBtn">MODE: BREAK</button>
        <button id="jumpBtn">JUMP</button>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
