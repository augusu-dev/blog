<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Voxel Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="hud">
    <div id="info">
      <div><b>PC:</b> クリック開始/WASD/Space/左:破壊/右:設置/1-6</div>
      <div><b>Mobile:</b> 左スティック/右ドラッグ/TAP/MODE/JUMP</div>
      <div id="status">Seed:<span id="sd">-</span> Size:<span id="sz">-</span> <span id="md">BREAK</span> <button id="rst">RESET</button></div>
      <div id="err"></div>
    </div>
    <div id="cross"></div>
    <div id="overlay"><button id="start">クリックして開始</button><p>モバイルはそのまま操作可</p></div>
    <div id="hotbar"></div>
    <div id="mobile">
      <div id="joyArea"><div id="joyBase"><div id="joyStick"></div></div></div>
      <div id="btns"><button id="modeBtn">BREAK</button><button id="jumpBtn">JUMP</button></div>
    </div>
  </div>
  <script src="main.js" type="module"></script>
</body>
</html>
