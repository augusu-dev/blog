<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロッククラフト - マインクラフト風ゲーム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #87CEEB;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 10;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }

        #crosshair::before {
            width: 2px;
            height: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        #crosshair::after {
            width: 20px;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 5;
            pointer-events: none;
        }

        #inventory {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 5;
        }

        .inventory-slot {
            width: 60px;
            height: 60px;
            background: rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .inventory-slot:hover {
            background: rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .inventory-slot.active {
            border-color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        .inventory-slot .block-preview {
            width: 40px;
            height: 40px;
        }

        .inventory-slot .slot-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }

        #start-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.8);
        }

        #start-screen button {
            font-size: 24px;
            padding: 15px 40px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
        }

        #start-screen button:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        #controls {
            margin-top: 30px;
            text-align: left;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }

        #controls h3 {
            margin-bottom: 10px;
        }

        #controls p {
            margin: 5px 0;
            font-size: 14px;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 50;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="start-screen">
            <h1>🎮 ブロッククラフト</h1>
            <button id="start-button">ゲーム開始</button>
            <div id="controls">
                <h3>操作方法:</h3>
                <p><strong>移動:</strong> W/A/S/D キー</p>
                <p><strong>ジャンプ:</strong> スペースキー</p>
                <p><strong>視点移動:</strong> マウス移動</p>
                <p><strong>ブロック設置:</strong> 右クリック</p>
                <p><strong>ブロック破壊:</strong> 左クリック</p>
                <p><strong>ブロック選択:</strong> 1〜6 キーまたはインベントリクリック</p>
            </div>
        </div>
        <div id="loading">地形生成中...</div>
        <div id="crosshair"></div>
        <div id="ui">
            <div id="position">座標: (0, 0, 0)</div>
            <div id="fps">FPS: 60</div>
            <div id="block-info">選択中: 草ブロック</div>
        </div>
        <div id="inventory"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
